{% extends "base.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🎓 GuruKhoj</div>
    <h2>Student Registration</h2>
    <p class="auth-sub">Create your account to find tutors</p>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password (min 6 characters)</label>
        <input type="password" name="password" placeholder="Create a password" minlength="6" required>
      </div>
      <button type="submit" class="btn-primary btn-full">🚀 Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login">Login here</a></p>
  </div>
</div>
{% endblock %}
