<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Dashboard – GuruKhoj</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark)">
<div style="text-align:center;max-width:500px;padding:0 20px">
  <div style="font-size:64px;margin-bottom:20px">👋</div>
  <h1 style="font-size:26px;font-weight:800;color:#fff;margin-bottom:10px">Welcome, {{ user.name }}!</h1>
  <p style="color:var(--muted);margin-bottom:28px">Logged in as <strong style="color:var(--pl)">{{ user.role }}</strong></p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a href="/our-teachers"><button class="btn btn-purple btn-lg">📋 Browse Teachers</button></a>
    <a href="/"><button class="btn btn-outline btn-lg">🏠 Go Home</button></a>
    <a href="/logout"><button class="btn btn-sm" style="background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--muted)">🚪 Logout</button></a>
  </div>
</div>
<div id="toast" class="toast"></div><script src="/static/js/main.js"></script>
</body></html>
